remote_theme: "mmistakes/minimal-mistakes@4.24.0"

title: "Harel Lidar"
subtitle: "AI Researcher & ML Engineer"
name: "Harel Lidar"
description: "Exploring the frontiers of artificial intelligence through research and implementation. Specializing in neural architectures, 3D vision, and transformer models."
minimal_mistakes_skin: "air"

future: true
search: true

url: "https://fearthedeer9.github.io"
baseurl: ""
repository: "fearthedeer9/fearthedeer9.github.io"

include:
  - _includes
  - _layouts
  - _pages

plugins:
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

permalink: /:year/:month/:day/:title/
paginate: 10
paginate_path: /blog/page:num/

markdown: kramdown
kramdown:
  math_engine: mathjax

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      read_time: true
      mathjax: true
      toc: true
      toc_sticky: true
      toc_label: "Contents"
      author_profile: true
      share: false
      related: true
      excerpt_separator: <!-- excerpt-end -->
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false

author:
  name: "Harel Lidar"
  bio: "AI Researcher & ML Engineer"
  location: "Israel"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/fearthedeer9"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/harel-lidar-3759b518a"
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:rllidar9@gmail.com"
