      - generic [ref=e10]:
        - paragraph [ref=e11]: I'm an applied researcher, focused on creating user interfaces that expand what people can think and do. My current focus is an augmented book which actively helps people understand, remember, and use what they read.
        - paragraph [ref=e12]:
          - text: I believe personal computers can enable
          - link "transformative tools for thought" [ref=e13] [cursor=pointer]:
            - /url: https://numinous.productions/ttft/
          - text: ": environments that radically transform what people can think and do, so much so that we expand the set of thoughts it’s possible to think. I want to produce"
          - emphasis [ref=e14]: alien cognitive and creative powers
          - text: —as wondrous and magical to us today as a modern visual effects artist might seem to a cave painter.
        - paragraph [ref=e15]:
          - text: I’ve been independently funded by my
          - link "Patreon" [ref=e16] [cursor=pointer]:
            - /url: https://www.patreon.com/quantumcountry
          - text: community since 2019. But as of late 2025, I’m on “para-academic leave”, helping make
          - link "Pico" [ref=e17] [cursor=pointer]:
            - /url: https://withpico.com
          - text: ", a conservatory for human attention."
        - paragraph [ref=e18]:
          - text: Prior to my current work, I helped build iOS at Apple and led
          - link "R&D at Khan Academy" [ref=e19] [cursor=pointer]:
