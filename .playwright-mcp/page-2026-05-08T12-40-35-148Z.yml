    - article [ref=e55]:
      - heading "Reward Hacking in Reinforcement Learning" [level=2] [ref=e57]
      - paragraph [ref=e59]: Reward hacking occurs when a reinforcement learning (RL) agent exploits flaws or ambiguities in the reward function to achieve high rewards, without genuinely learning or completing the intended task. Reward hacking exists because RL environments are often imperfect, and it is fundamentally challenging to accurately specify a reward function. With the rise of language models generalizing to a broad spectrum of tasks and RLHF becomes a de facto method for alignment training, reward hacking in RL training of language models has become a critical practical challenge. Instances where the model learns to modify unit tests to pass coding tasks, or where responses contain biases that mimic a user’s preference, are pretty concerning and are likely one of the major blockers for real-world deployment of more autonomous use cases of AI models. ...
      - generic [ref=e60]: "Date: November 28, 2024 | Estimated Reading Time: 37 min | Author: Lilian Weng"
      - link "post link to Reward Hacking in Reinforcement Learning" [ref=e61] [cursor=pointer]:
        - /url: https://lilianweng.github.io/posts/2024-11-28-reward-hacking/
    - article [ref=e62]:
      - heading "Extrinsic Hallucinations in LLMs" [level=2] [ref=e64]
      - paragraph [ref=e66]: "Hallucination in large language models usually refers to the model generating unfaithful, fabricated, inconsistent, or nonsensical content. As a term, hallucination has been somewhat generalized to cases when the model makes mistakes. Here, I would like to narrow down the problem of hallucination to cases where the model output is fabricated and not grounded by either the provided context or world knowledge. There are two types of hallucination: In-context hallucination: The model output should be consistent with the source content in context. Extrinsic hallucination: The model output should be grounded by the pre-training dataset. However, given the size of the pre-training dataset, it is too expensive to retrieve and identify conflicts per generation. If we consider the pre-training data corpus as a proxy for world knowledge, we essentially try to ensure the model output is factual and verifiable by external world knowledge. Equally importantly, when the model does not know about a fact, it should say so. This post focuses on extrinsic hallucination. To avoid hallucination, LLMs need to be (1) factual and (2) acknowledge not knowing the answer when applicable. ..."
      - generic [ref=e67]: "Date: July 7, 2024 | Estimated Reading Time: 29 min | Author: Lilian Weng"
      - link "post link to Extrinsic Hallucinations in LLMs" [ref=e68] [cursor=pointer]:
        - /url: https://lilianweng.github.io/posts/2024-07-07-hallucination/
    - article [ref=e69]:
      - heading "Diffusion Models for Video Generation" [level=2] [ref=e71]
      - paragraph [ref=e73]: "Diffusion models have demonstrated strong results on image synthesis in past years. Now the research community has started working on a harder task—using it for video generation. The task itself is a superset of the image case, since an image is a video of 1 frame, and it is much more challenging because: It has extra requirements on temporal consistency across frames in time, which naturally demands more world knowledge to be encoded into the model. In comparison to text or images, it is more difficult to collect large amounts of high-quality, high-dimensional video data, let along text-video pairs. 🥑 Required Pre-read: Please make sure you have read the previous blog on “What are Diffusion Models?” for image generation before continue here. ..."
      - generic [ref=e74]: "Date: April 12, 2024 | Estimated Reading Time: 20 min | Author: Lilian Weng"
      - link "post link to Diffusion Models for Video Generation" [ref=e75] [cursor=pointer]:
        - /url: https://lilianweng.github.io/posts/2024-04-12-diffusion-video/
    - article [ref=e76]:
      - heading "Thinking about High-Quality Human Data" [level=2] [ref=e78]
      - paragraph [ref=e80]: "[Special thank you to Ian Kivlichan for many useful pointers (E.g. the 100+ year old Nature paper “Vox populi”) and nice feedback. 🙏 ] High-quality data is the fuel for modern data deep learning model training. Most of the task-specific labeled data comes from human annotation, such as classification task or RLHF labeling (which can be constructed as classification format) for LLM alignment training. Lots of ML techniques in the post can help with data quality, but fundamentally human data collection involves attention to details and careful execution. The community knows the value of high quality data, but somehow we have this subtle impression that “Everyone wants to do the model work, not the data work” (Sambasivan et al. 2021). ..."
      - generic [ref=e81]: "Date: February 5, 2024 | Estimated Reading Time: 20 min | Author: Lilian Weng"
