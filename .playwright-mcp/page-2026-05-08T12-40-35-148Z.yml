    - article [ref=e83]:
      - heading "Adversarial Attacks on LLMs" [level=2] [ref=e85]
      - paragraph [ref=e87]: The use of large language models in the real world has strongly accelerated by the launch of ChatGPT. We (including my team at OpenAI, shoutout to them) have invested a lot of effort to build default safe behavior into the model during the alignment process (e.g. via RLHF). However, adversarial attacks or jailbreak prompts could potentially trigger the model to output something undesired. A large body of ground work on adversarial attacks is on images, and differently it operates in the continuous, high-dimensional space. Attacks for discrete data like text have been considered to be a lot more challenging, due to lack of direct gradient signals. My past post on Controllable Text Generation is quite relevant to this topic, as attacking LLMs is essentially to control the model to output a certain type of (unsafe) content. ...
      - generic [ref=e88]: "Date: October 25, 2023 | Estimated Reading Time: 33 min | Author: Lilian Weng"
      - link "post link to Adversarial Attacks on LLMs" [ref=e89] [cursor=pointer]:
        - /url: https://lilianweng.github.io/posts/2023-10-25-adv-attack-llm/
    - article [ref=e90]:
      - heading "LLM Powered Autonomous Agents" [level=2] [ref=e92]
      - paragraph [ref=e94]: "Building agents with LLM (large language model) as its core controller is a cool concept. Several proof-of-concepts demos, such as AutoGPT, GPT-Engineer and BabyAGI, serve as inspiring examples. The potentiality of LLM extends beyond generating well-written copies, stories, essays and programs; it can be framed as a powerful general problem solver. Agent System Overview In a LLM-powered autonomous agent system, LLM functions as the agent’s brain, complemented by several key components: Planning Subgoal and decomposition: The agent breaks down large tasks into smaller, manageable subgoals, enabling efficient handling of complex tasks. Reflection and refinement: The agent can do self-criticism and self-reflection over past actions, learn from mistakes and refine them for future steps, thereby improving the quality of final results. Memory Short-term memory: I would consider all the in-context learning (See Prompt Engineering) as utilizing short-term memory of the model to learn. Long-term memory: This provides the agent with the capability to retain and recall (infinite) information over extended periods, often by leveraging an external vector store and fast retrieval. Tool use The agent learns to call external APIs for extra information that is missing from the model weights (often hard to change after pre-training), including current information, code execution capability, access to proprietary information sources and more. Overview of a LLM-powered autonomous agent system. Component One: Planning A complicated task usually involves many steps. An agent needs to know what they are and plan ahead. ..."
      - generic [ref=e95]: "Date: June 23, 2023 | Estimated Reading Time: 31 min | Author: Lilian Weng"
      - link "post link to LLM Powered Autonomous Agents" [ref=e96] [cursor=pointer]:
        - /url: https://lilianweng.github.io/posts/2023-06-23-agent/
    - article [ref=e97]:
      - heading "Prompt Engineering" [level=2] [ref=e99]
      - paragraph [ref=e101]: Prompt Engineering, also known as In-Context Prompting, refers to methods for how to communicate with LLM to steer its behavior for desired outcomes without updating the model weights. It is an empirical science and the effect of prompt engineering methods can vary a lot among models, thus requiring heavy experimentation and heuristics. This post only focuses on prompt engineering for autoregressive language models, so nothing with Cloze tests, image generation or multimodality models. At its core, the goal of prompt engineering is about alignment and model steerability. Check my previous post on controllable text generation. ...
      - generic [ref=e102]: "Date: March 15, 2023 | Estimated Reading Time: 21 min | Author: Lilian Weng"
      - link "post link to Prompt Engineering" [ref=e103] [cursor=pointer]:
