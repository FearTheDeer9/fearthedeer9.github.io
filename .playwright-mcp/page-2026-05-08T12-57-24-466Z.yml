          - paragraph [ref=e455]: The uniform prior drops out because it’s constant, meaning that maximizing the posterior (MAP) is equivalent to maximizing the likelihood. This explains why standard linear regression can be interpreted as both maximum likelihood and MAP estimation.
          - heading "Philosophical Implications Permalink " [level=2] [ref=e456]:
            - text: Philosophical Implications
            - link "Permalink " [ref=e457] [cursor=pointer]:
