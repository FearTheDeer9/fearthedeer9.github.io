              - generic [ref=e458]: Permalink
              - generic [ref=e459]: 
          - paragraph [ref=e460]: "This separation of assumptions helps us think more clearly about what we’re really doing in linear regression:"
          - list [ref=e461]:
            - listitem [ref=e462]: We first make a strong assumption about the structure of reality (linearity)
            - listitem [ref=e463]: We then make an assumption about how measurements deviate from this structure (Gaussian noise)
            - listitem [ref=e464]: Finally, we express uncertainty about the parameters of our linear model (uniform prior)
          - paragraph [ref=e465]: The Gaussian noise assumption is often justified by the Central Limit Theorem - when many small, independent factors affect our measurements, their sum tends toward a Gaussian distribution. But the linearity assumption is harder to justify theoretically - it’s usually chosen for simplicity and often works well enough in practice.
          - heading "Conclusion Permalink " [level=2] [ref=e466]:
            - text: Conclusion
            - link "Permalink " [ref=e467] [cursor=pointer]:
              - /url: "#conclusion"
              - generic [ref=e468]: Permalink
              - generic [ref=e469]: 
          - paragraph [ref=e470]: "Understanding these distinctions helps us be more thoughtful practitioners. When linear regression fails, we should ask:"
          - list [ref=e471]:
            - listitem [ref=e472]: Is our linearity assumption wrong?
            - listitem [ref=e473]: Is our Gaussian noise assumption wrong?
            - listitem [ref=e474]: Is our uniform prior inappropriate?
          - paragraph [ref=e475]: Each of these represents a different type of model failure requiring different solutions. The mathematics of linear regression isn’t just about finding lines through points - it’s about making explicit our assumptions about the structure of reality and the nature of measurement uncertainty.
