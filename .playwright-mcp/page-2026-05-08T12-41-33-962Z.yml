        - paragraph [ref=e32]:
          - text: Building agents with LLM (large language model) as its core controller is a cool concept. Several proof-of-concepts demos, such as
          - link "AutoGPT" [ref=e33] [cursor=pointer]:
            - /url: https://github.com/Significant-Gravitas/Auto-GPT
          - text: ","
          - link "GPT-Engineer" [ref=e34] [cursor=pointer]:
