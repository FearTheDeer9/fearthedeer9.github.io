          - text: and
          - link "BabyAGI" [ref=e35] [cursor=pointer]:
            - /url: https://github.com/yoheinakajima/babyagi
          - text: ", serve as inspiring examples. The potentiality of LLM extends beyond generating well-written copies, stories, essays and programs; it can be framed as a powerful general problem solver."
        - heading "Agent System Overview" [level=1] [ref=e36]
        - paragraph [ref=e37]: "In a LLM-powered autonomous agent system, LLM functions as the agent’s brain, complemented by several key components:"
        - list [ref=e38]:
          - listitem [ref=e39]:
            - strong [ref=e40]: Planning
            - list [ref=e41]:
              - listitem [ref=e42]: "Subgoal and decomposition: The agent breaks down large tasks into smaller, manageable subgoals, enabling efficient handling of complex tasks."
              - listitem [ref=e43]: "Reflection and refinement: The agent can do self-criticism and self-reflection over past actions, learn from mistakes and refine them for future steps, thereby improving the quality of final results."
          - listitem [ref=e44]:
            - strong [ref=e45]: Memory
            - list [ref=e46]:
              - listitem [ref=e47]:
                - text: "Short-term memory: I would consider all the in-context learning (See"
                - link "Prompt Engineering" [ref=e48] [cursor=pointer]:
                  - /url: https://lilianweng.github.io/posts/2023-03-15-prompt-engineering/
                - text: ) as utilizing short-term memory of the model to learn.
              - listitem [ref=e49]: "Long-term memory: This provides the agent with the capability to retain and recall (infinite) information over extended periods, often by leveraging an external vector store and fast retrieval."
          - listitem [ref=e50]:
            - strong [ref=e51]: Tool use
            - list [ref=e52]:
              - listitem [ref=e53]: The agent learns to call external APIs for extra information that is missing from the model weights (often hard to change after pre-training), including current information, code execution capability, access to proprietary information sources and more.
