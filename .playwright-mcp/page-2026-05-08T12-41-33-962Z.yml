        - heading "Types of Memory" [level=2] [ref=e496]
        - paragraph [ref=e497]: Memory can be defined as the processes used to acquire, store, retain, and later retrieve information. There are several types of memory in human brains.
        - list [ref=e498]:
          - listitem [ref=e499]:
            - paragraph [ref=e500]:
              - strong [ref=e501]: Sensory Memory
              - text: ": This is the earliest stage of memory, providing the ability to retain impressions of sensory information (visual, auditory, etc) after the original stimuli have ended. Sensory memory typically only lasts for up to a few seconds. Subcategories include iconic memory (visual), echoic memory (auditory), and haptic memory (touch)."
          - listitem [ref=e502]:
            - paragraph [ref=e503]:
              - strong [ref=e504]: Short-Term Memory
              - text: (STM) or
              - strong [ref=e505]: Working Memory
              - text: ": It stores information that we are currently aware of and needed to carry out complex cognitive tasks such as learning and reasoning. Short-term memory is believed to have the capacity of about 7 items ("
              - link "Miller 1956" [ref=e506] [cursor=pointer]:
                - /url: psychclassics.yorku.ca/Miller/
              - text: ) and lasts for 20-30 seconds.
          - listitem [ref=e507]:
            - paragraph [ref=e508]:
              - strong [ref=e509]: Long-Term Memory
              - text: "(LTM): Long-term memory can store information for a remarkably long time, ranging from a few days to decades, with an essentially unlimited storage capacity. There are two subtypes of LTM:"
            - list [ref=e510]:
              - listitem [ref=e511]: "Explicit / declarative memory: This is memory of facts and events, and refers to those memories that can be consciously recalled, including episodic memory (events and experiences) and semantic memory (facts and concepts)."
              - listitem [ref=e512]: "Implicit / procedural memory: This type of memory is unconscious and involves skills and routines that are performed automatically, like riding a bike or typing on a keyboard."
        - figure "Categorization of human memory." [ref=e513]:
          - img [ref=e514]
          - generic [ref=e515]: Categorization of human memory.
        - paragraph [ref=e516]: "We can roughly consider the following mappings:"
        - list [ref=e517]:
          - listitem [ref=e518]: Sensory memory as learning embedding representations for raw inputs, including text, image or other modalities;
          - listitem [ref=e519]: Short-term memory as in-context learning. It is short and finite, as it is restricted by the finite context window length of Transformer.
          - listitem [ref=e520]: Long-term memory as the external vector store that the agent can attend to at query time, accessible via fast retrieval.
        - heading "Maximum Inner Product Search (MIPS)" [level=2] [ref=e521]
        - paragraph [ref=e522]:
          - text: The external memory can alleviate the restriction of finite attention span. A standard practice is to save the embedding representation of information into a vector store database that can support fast maximum inner-product search (
          - link "MIPS" [ref=e523] [cursor=pointer]:
            - /url: https://en.wikipedia.org/wiki/Maximum_inner-product_search
          - text: ). To optimize the retrieval speed, the common choice is the
          - emphasis [ref=e524]: approximate nearest neighbors (ANN)
          - text: algorithm to return approximately top k nearest neighbors to trade off a little accuracy lost for a huge speedup.
        - paragraph [ref=e525]: "A couple common choices of ANN algorithms for fast MIPS:"
        - list [ref=e526]:
          - listitem [ref=e527]:
            - link "LSH" [ref=e528] [cursor=pointer]:
              - /url: https://en.wikipedia.org/wiki/Locality-sensitive_hashing
              - strong [ref=e529]: LSH
            - text: "(Locality-Sensitive Hashing): It introduces a"
            - emphasis [ref=e530]: hashing
            - text: function such that similar input items are mapped to the same buckets with high probability, where the number of buckets is much smaller than the number of inputs.
          - listitem [ref=e531]:
            - link "ANNOY" [ref=e532] [cursor=pointer]:
              - /url: https://github.com/spotify/annoy
              - strong [ref=e533]: ANNOY
            - text: "(Approximate Nearest Neighbors Oh Yeah): The core data structure are"
            - emphasis [ref=e534]: random projection trees
            - text: ", a set of binary trees where each non-leaf node represents a hyperplane splitting the input space into half and each leaf stores one data point. Trees are built independently and at random, so to some extent, it mimics a hashing function. ANNOY search happens in all the trees to iteratively search through the half that is closest to the query and then aggregates the results. The idea is quite related to KD tree but a lot more scalable."
          - listitem [ref=e535]:
            - link "HNSW" [ref=e536] [cursor=pointer]:
              - /url: https://arxiv.org/abs/1603.09320
              - strong [ref=e537]: HNSW
            - text: "(Hierarchical Navigable Small World): It is inspired by the idea of"
            - link "small world networks" [ref=e538] [cursor=pointer]:
              - /url: https://en.wikipedia.org/wiki/Small-world_network
            - text: where most nodes can be reached by any other nodes within a small number of steps; e.g. “six degrees of separation” feature of social networks. HNSW builds hierarchical layers of these small-world graphs, where the bottom layers contain the actual data points. The layers in the middle create shortcuts to speed up search. When performing a search, HNSW starts from a random node in the top layer and navigates towards the target. When it can’t get any closer, it moves down to the next layer, until it reaches the bottom layer. Each move in the upper layers can potentially cover a large distance in the data space, and each move in the lower layers refines the search quality.
          - listitem [ref=e539]:
            - link "FAISS" [ref=e540] [cursor=pointer]:
              - /url: https://github.com/facebookresearch/faiss
              - strong [ref=e541]: FAISS
            - text: "(Facebook AI Similarity Search): It operates on the assumption that in high dimensional space, distances between nodes follow a Gaussian distribution and thus there should exist"
            - emphasis [ref=e542]: clustering
            - text: of data points. FAISS applies vector quantization by partitioning the vector space into clusters and then refining the quantization within clusters. Search first looks for cluster candidates with coarse quantization and then further looks into each cluster with finer quantization.
          - listitem [ref=e543]:
            - link "ScaNN" [ref=e544] [cursor=pointer]:
              - /url: https://github.com/google-research/google-research/tree/master/scann
              - strong [ref=e545]: ScaNN
            - text: "(Scalable Nearest Neighbors): The main innovation in ScaNN is"
            - emphasis [ref=e546]: anisotropic vector quantization
            - text: . It quantizes a data point
            - generic [ref=e547]:
              - generic [ref=e549]:
                - generic [ref=e551]: x
                - generic [ref=e554]: i
              - math [ref=e556]:
                - generic [ref=e557]:
                  - generic [ref=e558]: x
                  - generic [ref=e559]: i
            - text: to
            - generic [ref=e560]:
              - generic [ref=e562]:
                - generic [ref=e564]:
                  - generic [ref=e566]: ~
                  - generic [ref=e569]: x
                - generic [ref=e572]: i
              - math [ref=e574]:
                - generic [ref=e575]:
                  - generic [ref=e577]:
                    - generic [ref=e578]: x
                    - generic [ref=e579]: ~
                  - generic [ref=e580]: i
            - text: such that the inner product
            - generic [ref=e581]:
              - generic [ref=e582]:
                - generic [ref=e584]: ⟨
                - generic [ref=e586]: q
                - generic [ref=e588]: ","
                - generic [ref=e589]:
                  - generic [ref=e591]: x
                  - generic [ref=e594]: i
                - generic [ref=e596]: ⟩
              - math [ref=e598]:
                - generic [ref=e599]: ⟨
                - generic [ref=e600]: q
                - generic [ref=e601]: ","
                - generic [ref=e602]:
                  - generic [ref=e603]: x
                  - generic [ref=e604]: i
                - generic [ref=e605]: ⟩
            - text: is as similar to the original distance of
            - generic [ref=e606]:
              - generic [ref=e607]:
                - generic [ref=e609]: ∠
                - generic [ref=e611]: q
                - generic [ref=e613]: ","
                - generic [ref=e614]:
                  - generic [ref=e616]:
                    - generic [ref=e618]: ~
                    - generic [ref=e621]: x
                  - generic [ref=e624]: i
              - math [ref=e626]:
                - generic [ref=e627]: ∠
                - generic [ref=e628]: q
                - generic [ref=e629]: ","
                - generic [ref=e630]:
                  - generic [ref=e632]:
                    - generic [ref=e633]: x
                    - generic [ref=e634]: ~
                  - generic [ref=e635]: i
            - text: as possible, instead of picking the closet quantization centroid points.
        - 'figure "Comparison of MIPS algorithms, measured in recall@10. (Image source: Google Blog, 2020)" [ref=e636]':
          - img [ref=e637]
          - generic [ref=e638]:
            - text: "Comparison of MIPS algorithms, measured in recall@10. (Image source:"
            - link "Google Blog, 2020" [ref=e639] [cursor=pointer]:
              - /url: https://ai.googleblog.com/2020/07/announcing-scann-efficient-vector.html
            - text: )
        - paragraph [ref=e640]:
          - text: Check more MIPS algorithms and performance comparison in
          - link "ann-benchmarks.com" [ref=e641] [cursor=pointer]:
            - /url: https://ann-benchmarks.com/
          - text: .
        - 'heading "Component Three: Tool Use" [level=1] [ref=e642]'
        - paragraph [ref=e643]: Tool use is a remarkable and distinguishing characteristic of human beings. We create, modify and utilize external objects to do things that go beyond our physical and cognitive limits. Equipping LLMs with external tools can significantly extend the model capabilities.
        - 'figure "A picture of a sea otter using rock to crack open a seashell, while floating in the water. While some other animals can use tools, the complexity is not comparable with humans. (Image source: Animals using tools)" [ref=e644]':
          - img [ref=e645]
          - generic [ref=e646]:
            - text: "A picture of a sea otter using rock to crack open a seashell, while floating in the water. While some other animals can use tools, the complexity is not comparable with humans. (Image source:"
            - link "Animals using tools" [ref=e647] [cursor=pointer]:
              - /url: https://www.popularmechanics.com/science/animals/g39714258/animals-using-tools/
            - text: )
        - paragraph [ref=e648]:
          - strong [ref=e649]: MRKL
          - text: (
          - link "Karpas et al. 2022" [ref=e650] [cursor=pointer]:
            - /url: https://arxiv.org/abs/2205.00445
          - text: ), short for “Modular Reasoning, Knowledge and Language”, is a neuro-symbolic architecture for autonomous agents. A MRKL system is proposed to contain a collection of “expert” modules and the general-purpose LLM works as a router to route inquiries to the best suitable expert module. These modules can be neural (e.g. deep learning models) or symbolic (e.g. math calculator, currency converter, weather API).
        - paragraph [ref=e651]:
          - text: They did an experiment on fine-tuning LLM to call a calculator, using arithmetic as a test case. Their experiments showed that it was harder to solve verbal math problems than explicitly stated math problems because LLMs (7B Jurassic1-large model) failed to extract the right arguments for the basic arithmetic reliably. The results highlight when the external symbolic tools can work reliably,
          - emphasis [ref=e652]: knowing when to and how to use the tools are crucial
          - text: ", determined by the LLM capability."
        - paragraph [ref=e653]:
          - text: Both
          - strong [ref=e654]: TALM
          - text: (Tool Augmented Language Models;
          - link "Parisi et al. 2022" [ref=e655] [cursor=pointer]:
            - /url: https://arxiv.org/abs/2205.12255
          - text: ) and
          - strong [ref=e656]: Toolformer
          - text: (
          - link "Schick et al. 2023" [ref=e657] [cursor=pointer]:
            - /url: https://arxiv.org/abs/2302.04761
          - text: ) fine-tune a LM to learn to use external tool APIs. The dataset is expanded based on whether a newly added API call annotation can improve the quality of model outputs. See more details in the
          - link "“External APIs” section" [ref=e658] [cursor=pointer]:
            - /url: https://lilianweng.github.io/posts/2023-03-15-prompt-engineering/#external-apis
          - text: of Prompt Engineering.
        - paragraph [ref=e659]:
          - text: ChatGPT
          - link "Plugins" [ref=e660] [cursor=pointer]:
            - /url: https://openai.com/blog/chatgpt-plugins
          - text: and OpenAI API
          - link "function calling" [ref=e661] [cursor=pointer]:
            - /url: https://platform.openai.com/docs/guides/gpt/function-calling
          - text: are good examples of LLMs augmented with tool use capability working in practice. The collection of tool APIs can be provided by other developers (as in Plugins) or self-defined (as in function calls).
        - paragraph [ref=e662]:
          - strong [ref=e663]: HuggingGPT
          - text: (
          - link "Shen et al. 2023" [ref=e664] [cursor=pointer]:
            - /url: https://arxiv.org/abs/2303.17580
          - text: ) is a framework to use ChatGPT as the task planner to select models available in HuggingFace platform according to the model descriptions and summarize the response based on the execution results.
        - 'figure "Illustration of how HuggingGPT works. (Image source: Shen et al. 2023)" [ref=e665]':
          - img [ref=e666]
          - generic [ref=e667]:
            - text: "Illustration of how HuggingGPT works. (Image source:"
            - link "Shen et al. 2023" [ref=e668] [cursor=pointer]:
              - /url: https://arxiv.org/abs/2303.17580
            - text: )
        - paragraph [ref=e669]: "The system comprises of 4 stages:"
        - paragraph [ref=e670]:
          - strong [ref=e671]: (1) Task planning
          - text: ": LLM works as the brain and parses the user requests into multiple tasks. There are four attributes associated with each task: task type, ID, dependencies, and arguments. They use few-shot examples to guide LLM to do task parsing and planning."
        - paragraph [ref=e672]: "Instruction:"
        - generic [ref=e673]: "The AI assistant can parse user input to several tasks: [{\"task\": task, \"id\", task_id, \"dep\": dependency_task_ids, \"args\": {\"text\": text, \"image\": URL, \"audio\": URL, \"video\": URL}}]. The \"dep\" field denotes the id of the previous task which generates a new resource that the current task relies on. A special tag \"-task_id\" refers to the generated text image, audio and video in the dependency task with id as task_id. The task MUST be selected from the following options: {{ Available Task List }}. There is a logical relationship between tasks, please note their order. If the user input can't be parsed, you need to reply empty JSON. Here are several cases for your reference: {{ Demonstrations }}. The chat history is recorded as {{ Chat History }}. From this chat history, you can find the path of the user-mentioned resources for your task planning."
        - paragraph [ref=e674]:
          - strong [ref=e675]: (2) Model selection
          - text: ": LLM distributes the tasks to expert models, where the request is framed as a multiple-choice question. LLM is presented with a list of models to choose from. Due to the limited context length, task type based filtration is needed."
        - paragraph [ref=e676]: "Instruction:"
        - generic [ref=e677]: "Given the user request and the call command, the AI assistant helps the user to select a suitable model from a list of models to process the user request. The AI assistant merely outputs the model id of the most appropriate model. The output must be in a strict JSON format: \"id\": \"id\", \"reason\": \"your detail reason for the choice\". We have a list of models for you to choose from {{ Candidate Models }}. Please select one model from the list."
        - paragraph [ref=e678]:
          - strong [ref=e679]: (3) Task execution
          - text: ": Expert models execute on the specific tasks and log results."
        - paragraph [ref=e680]: "Instruction:"
        - generic [ref=e681]: "With the input and the inference results, the AI assistant needs to describe the process and results. The previous stages can be formed as - User Input: {{ User Input }}, Task Planning: {{ Tasks }}, Model Selection: {{ Model Assignment }}, Task Execution: {{ Predictions }}. You must first answer the user's request in a straightforward manner. Then describe the task process and show your analysis and model inference results to the user in the first person. If inference results contain a file path, must tell the user the complete file path."
        - paragraph [ref=e682]:
          - strong [ref=e683]: (4) Response generation
          - text: ": LLM receives the execution results and provides summarized results to users."
        - paragraph [ref=e684]: "To put HuggingGPT into real world usage, a couple challenges need to solve: (1) Efficiency improvement is needed as both LLM inference rounds and interactions with other models slow down the process; (2) It relies on a long context window to communicate over complicated task content; (3) Stability improvement of LLM outputs and external model services."
        - paragraph [ref=e685]:
          - strong [ref=e686]: API-Bank
          - text: (
          - link "Li et al. 2023" [ref=e687] [cursor=pointer]:
            - /url: https://arxiv.org/abs/2304.08244
          - text: ) is a benchmark for evaluating the performance of tool-augmented LLMs. It contains 53 commonly used API tools, a complete tool-augmented LLM workflow, and 264 annotated dialogues that involve 568 API calls. The selection of APIs is quite diverse, including search engines, calculator, calendar queries, smart home control, schedule management, health data management, account authentication workflow and more. Because there are a large number of APIs, LLM first has access to API search engine to find the right API to call and then uses the corresponding documentation to make a call.
        - 'figure "Pseudo code of how LLM makes an API call in API-Bank. (Image source: Li et al. 2023)" [ref=e688]':
          - img [ref=e689]
          - generic [ref=e690]:
            - text: "Pseudo code of how LLM makes an API call in API-Bank. (Image source:"
            - link "Li et al. 2023" [ref=e691] [cursor=pointer]:
              - /url: https://arxiv.org/abs/2304.08244
            - text: )
        - paragraph [ref=e692]: "In the API-Bank workflow, LLMs need to make a couple of decisions and at each step we can evaluate how accurate that decision is. Decisions include:"
        - list [ref=e693]:
          - listitem [ref=e694]: Whether an API call is needed.
          - listitem [ref=e695]: "Identify the right API to call: if not good enough, LLMs need to iteratively modify the API inputs (e.g. deciding search keywords for Search Engine API)."
          - listitem [ref=e696]: "Response based on the API results: the model can choose to refine and call again if results are not satisfied."
        - paragraph [ref=e697]: "This benchmark evaluates the agent’s tool use capabilities at three levels:"
        - list [ref=e698]:
          - listitem [ref=e699]:
            - text: Level-1 evaluates the ability to
            - emphasis [ref=e700]: call the API
            - text: . Given an API’s description, the model needs to determine whether to call a given API, call it correctly, and respond properly to API returns.
          - listitem [ref=e701]:
            - text: Level-2 examines the ability to
            - emphasis [ref=e702]: retrieve the API
            - text: . The model needs to search for possible APIs that may solve the user’s requirement and learn how to use them by reading documentation.
          - listitem [ref=e703]:
            - text: Level-3 assesses the ability to
            - emphasis [ref=e704]: plan API beyond retrieve and call
            - text: . Given unclear user requests (e.g. schedule group meetings, book flight/hotel/restaurant for a trip), the model may have to conduct multiple API calls to solve it.
        - heading "Case Studies" [level=1] [ref=e705]
        - heading "Scientific Discovery Agent" [level=2] [ref=e706]
        - paragraph [ref=e707]:
          - strong [ref=e708]: ChemCrow
          - text: (
          - link "Bran et al. 2023" [ref=e709] [cursor=pointer]:
            - /url: https://arxiv.org/abs/2304.05376
          - text: ) is a domain-specific example in which LLM is augmented with 13 expert-designed tools to accomplish tasks across organic synthesis, drug discovery, and materials design. The workflow, implemented in
          - link "LangChain" [ref=e710] [cursor=pointer]:
            - /url: https://github.com/hwchase17/langchain
          - text: ", reflects what was previously described in the"
          - link "ReAct" [ref=e711] [cursor=pointer]:
            - /url: "#react"
          - text: and
          - link "MRKLs" [ref=e712] [cursor=pointer]:
            - /url: "#mrkl"
          - text: "and combines CoT reasoning with tools relevant to the tasks:"
        - list [ref=e713]:
          - listitem [ref=e714]: The LLM is provided with a list of tool names, descriptions of their utility, and details about the expected input/output.
          - listitem [ref=e715]:
            - text: It is then instructed to answer a user-given prompt using the tools provided when necessary. The instruction suggests the model to follow the ReAct format -
            - code [ref=e716]: Thought, Action, Action Input, Observation
            - text: .
        - paragraph [ref=e717]: One interesting observation is that while the LLM-based evaluation concluded that GPT-4 and ChemCrow perform nearly equivalently, human evaluations with experts oriented towards the completion and chemical correctness of the solutions showed that ChemCrow outperforms GPT-4 by a large margin. This indicates a potential problem with using LLM to evaluate its own performance on domains that requires deep expertise. The lack of expertise may cause LLMs not knowing its flaws and thus cannot well judge the correctness of task results.
        - paragraph [ref=e718]:
          - link "Boiko et al. (2023)" [ref=e719] [cursor=pointer]:
            - /url: https://arxiv.org/abs/2304.05332
          - text: also looked into LLM-empowered agents for scientific discovery, to handle autonomous design, planning, and performance of complex scientific experiments. This agent can use tools to browse the Internet, read documentation, execute code, call robotics experimentation APIs and leverage other LLMs.
        - paragraph [ref=e720]:
          - text: For example, when requested to
          - code [ref=e721]: "\"develop a novel anticancer drug\""
          - text: ", the model came up with the following reasoning steps:"
        - list [ref=e722]:
          - listitem [ref=e723]: inquired about current trends in anticancer drug discovery;
          - listitem [ref=e724]: selected a target;
          - listitem [ref=e725]: requested a scaffold targeting these compounds;
          - listitem [ref=e726]: Once the compound was identified, the model attempted its synthesis.
        - paragraph [ref=e727]: They also discussed the risks, especially with illicit drugs and bioweapons. They developed a test set containing a list of known chemical weapon agents and asked the agent to synthesize them. 4 out of 11 requests (36%) were accepted to obtain a synthesis solution and the agent attempted to consult documentation to execute the procedure. 7 out of 11 were rejected and among these 7 rejected cases, 5 happened after a Web search while 2 were rejected based on prompt only.
        - heading "Generative Agents Simulation" [level=2] [ref=e728]
        - paragraph [ref=e729]:
          - strong [ref=e730]: Generative Agents
          - text: (
          - link "Park, et al. 2023" [ref=e731] [cursor=pointer]:
            - /url: https://arxiv.org/abs/2304.03442
          - text: ) is super fun experiment where 25 virtual characters, each controlled by a LLM-powered agent, are living and interacting in a sandbox environment, inspired by The Sims. Generative agents create believable simulacra of human behavior for interactive applications.
        - paragraph [ref=e732]: The design of generative agents combines LLM with memory, planning and reflection mechanisms to enable agents to behave conditioned on past experience, as well as to interact with other agents.
        - list [ref=e733]:
          - listitem [ref=e734]:
            - strong [ref=e735]: Memory
            - text: "stream: is a long-term memory module (external database) that records a comprehensive list of agents’ experience in natural language."
            - list [ref=e736]:
              - listitem [ref=e737]:
                - text: Each element is an
                - emphasis [ref=e738]: observation
                - text: ", an event directly provided by the agent. - Inter-agent communication can trigger new natural language statements."
          - listitem [ref=e739]:
            - strong [ref=e740]: Retrieval
            - text: "model: surfaces the context to inform the agent’s behavior, according to relevance, recency and importance."
            - list [ref=e741]:
              - listitem [ref=e742]: "Recency: recent events have higher scores"
              - listitem [ref=e743]: "Importance: distinguish mundane from core memories. Ask LM directly."
              - listitem [ref=e744]: "Relevance: based on how related it is to the current situation / query."
          - listitem [ref=e745]:
            - strong [ref=e746]: Reflection
            - text: "mechanism: synthesizes memories into higher level inferences over time and guides the agent’s future behavior. They are"
            - emphasis [ref=e747]: higher-level summaries of past events
            - text: (<- note that this is a bit different from
            - link "self-reflection" [ref=e748] [cursor=pointer]:
              - /url: "#self-reflection"
            - text: above)
            - list [ref=e749]:
              - listitem [ref=e750]: Prompt LM with 100 most recent observations and to generate 3 most salient high-level questions given a set of observations/statements. Then ask LM to answer those questions.
          - listitem [ref=e751]:
            - strong [ref=e752]: Planning & Reacting
            - text: ": translate the reflections and the environment information into actions"
            - list [ref=e753]:
              - listitem [ref=e754]: Planning is essentially in order to optimize believability at the moment vs in time.
              - listitem [ref=e755]:
                - text: "Prompt template:"
                - code [ref=e756]: "{Intro of an agent X}. Here is X's plan today in broad strokes: 1)"
              - listitem [ref=e757]: Relationships between agents and observations of one agent by another are all taken into consideration for planning and reacting.
              - listitem [ref=e758]: Environment information is present in a tree structure.
        - 'figure "The generative agent architecture. (Image source: Park et al. 2023)" [ref=e759]':
          - img [ref=e760]
          - generic [ref=e761]:
            - text: "The generative agent architecture. (Image source:"
            - link "Park et al. 2023" [ref=e762] [cursor=pointer]:
              - /url: https://arxiv.org/abs/2304.03442
            - text: )
        - paragraph [ref=e763]: This fun simulation results in emergent social behavior, such as information diffusion, relationship memory (e.g. two agents continuing the conversation topic) and coordination of social events (e.g. host a party and invite many others).
        - heading "Proof-of-Concept Examples" [level=2] [ref=e764]
        - paragraph [ref=e765]:
          - link "AutoGPT" [ref=e766] [cursor=pointer]:
            - /url: https://github.com/Significant-Gravitas/Auto-GPT
          - text: has drawn a lot of attention into the possibility of setting up autonomous agents with LLM as the main controller. It has quite a lot of reliability issues given the natural language interface, but nevertheless a cool proof-of-concept demo. A lot of code in AutoGPT is about format parsing.
        - paragraph [ref=e767]:
          - text: Here is the system message used by AutoGPT, where
          - code [ref=e768]: "{{...}}"
          - text: "are user inputs:"
        - code [ref=e770]: "You are {{ai-name}}, {{user-provided AI bot description}}. Your decisions must always be made independently without seeking user assistance. Play to your strengths as an LLM and pursue simple strategies with no legal complications. GOALS: 1. {{user-provided goal 1}} 2. {{user-provided goal 2}} 3. ... 4. ... 5. ... Constraints: 1. ~4000 word limit for short term memory. Your short term memory is short, so immediately save important information to files. 2. If you are unsure how you previously did something or want to recall past events, thinking about similar events will help you remember. 3. No user assistance 4. Exclusively use the commands listed in double quotes e.g. \"command name\" 5. Use subprocesses for commands that will not terminate within a few minutes Commands: 1. Google Search: \"google\", args: \"input\": \"<search>\" 2. Browse Website: \"browse_website\", args: \"url\": \"<url>\", \"question\": \"<what_you_want_to_find_on_website>\" 3. Start GPT Agent: \"start_agent\", args: \"name\": \"<name>\", \"task\": \"<short_task_desc>\", \"prompt\": \"<prompt>\" 4. Message GPT Agent: \"message_agent\", args: \"key\": \"<key>\", \"message\": \"<message>\" 5. List GPT Agents: \"list_agents\", args: 6. Delete GPT Agent: \"delete_agent\", args: \"key\": \"<key>\" 7. Clone Repository: \"clone_repository\", args: \"repository_url\": \"<url>\", \"clone_path\": \"<directory>\" 8. Write to file: \"write_to_file\", args: \"file\": \"<file>\", \"text\": \"<text>\" 9. Read file: \"read_file\", args: \"file\": \"<file>\" 10. Append to file: \"append_to_file\", args: \"file\": \"<file>\", \"text\": \"<text>\" 11. Delete file: \"delete_file\", args: \"file\": \"<file>\" 12. Search Files: \"search_files\", args: \"directory\": \"<directory>\" 13. Analyze Code: \"analyze_code\", args: \"code\": \"<full_code_string>\" 14. Get Improved Code: \"improve_code\", args: \"suggestions\": \"<list_of_suggestions>\", \"code\": \"<full_code_string>\" 15. Write Tests: \"write_tests\", args: \"code\": \"<full_code_string>\", \"focus\": \"<list_of_focus_areas>\" 16. Execute Python File: \"execute_python_file\", args: \"file\": \"<file>\" 17. Generate Image: \"generate_image\", args: \"prompt\": \"<prompt>\" 18. Send Tweet: \"send_tweet\", args: \"text\": \"<text>\" 19. Do Nothing: \"do_nothing\", args: 20. Task Complete (Shutdown): \"task_complete\", args: \"reason\": \"<reason>\" Resources: 1. Internet access for searches and information gathering. 2. Long Term memory management. 3. GPT-3.5 powered Agents for delegation of simple tasks. 4. File output. Performance Evaluation: 1. Continuously review and analyze your actions to ensure you are performing to the best of your abilities. 2. Constructively self-criticize your big-picture behavior constantly. 3. Reflect on past decisions and strategies to refine your approach. 4. Every command has a cost, so be smart and efficient. Aim to complete tasks in the least number of steps. You should only respond in JSON format as described below Response Format: { \"thoughts\": { \"text\": \"thought\", \"reasoning\": \"reasoning\", \"plan\": \"- short bulleted\\n- list that conveys\\n- long-term plan\", \"criticism\": \"constructive self-criticism\", \"speak\": \"thoughts summary to say to user\" }, \"command\": { \"name\": \"command name\", \"args\": { \"arg name\": \"value\" } } } Ensure the response can be parsed by Python json.loads"
        - paragraph [ref=e771]:
          - link "GPT-Engineer" [ref=e772] [cursor=pointer]:
            - /url: https://github.com/AntonOsika/gpt-engineer
          - text: is another project to create a whole repository of code given a task specified in natural language. The GPT-Engineer is instructed to think over a list of smaller components to build and ask for user input to clarify questions as needed.
        - paragraph [ref=e773]:
          - text: Here are a sample conversation for task clarification sent to OpenAI ChatCompletion endpoint used by GPT-Engineer. The user inputs are wrapped in
          - code [ref=e774]: "{{user input text}}"
          - text: .
        - code [ref=e776]: "[ { \"role\": \"system\", \"content\": \"You will read instructions and not carry them out, only seek to clarify them.\\nSpecifically you will first summarise a list of super short bullets of areas that need clarification.\\nThen you will pick one clarifying question, and wait for an answer from the user.\\n\" }, { \"role\": \"user\", \"content\": \"We are writing {{a Super Mario game in python. MVC components split in separate files. Keyboard control.}}\\n\" }, { \"role\": \"assistant\", \"content\": \"Summary of areas that need clarification:\\n1. Specifics of the Super Mario game (e.g. level design, characters, gameplay mechanics)\\n2. Details about the MVC components (e.g. which components are in each file)\\n3. Keyboard control implementation (e.g. which keys to use, how to handle input)\\n\\nClarifying question:\\nCan you provide more details about the Super Mario game, such as level design, characters, and gameplay mechanics?\" }, { \"role\": \"user\", \"content\": \"{{There are 10 levels in total. The main character is a plumber named Mario, who can walk and jump. It is a classical platform game just like Super Mario. The main character moves from left to right, trying to get to the destination, where there are many obstacles and attacks from enemies in the process.}}\\n\\nIs anything else unclear? If yes, only answer in the form:\\n{remaining unclear areas} remaining questions.\\n{Next question}\\nIf everything is sufficiently clear, only answer \\\"Nothing more to clarify.\\\".\" }, { \"role\": \"assistant\", \"content\": \"Remaining unclear areas: 2 remaining questions.\\nCan you provide more information about how the MVC components are split into separate files?\" }, { \"role\": \"user\", \"content\": \"{{Make your own assumptions and state them explicitly before starting}}\" } ]"
        - paragraph [ref=e777]: "Then after these clarification, the agent moved into the code writing mode with a different system message. System message:"
        - generic [ref=e778]:
          - text: You will get instructions for code to write. You will write a very long answer. Make sure that every detail of the architecture is, in the end, implemented as code. Make sure that every detail of the architecture is, in the end, implemented as code.
          - paragraph [ref=e779]: Think step by step and reason yourself to the right decisions to make sure we get it right. You will first lay out the names of the core classes, functions, methods that will be necessary, as well as a quick comment on their purpose.
          - paragraph [ref=e780]: "Then you will output the content of each file including ALL code. Each file must strictly follow a markdown code block format, where the following tokens must be replaced such that FILENAME is the lowercase file name including the file extension, LANG is the markup code block language for the code’s language, and CODE is the code:"
          - paragraph [ref=e781]: FILENAME
          - code [ref=e783]: CODE
          - paragraph [ref=e784]: You will start with the “entrypoint” file, then go to the ones that are imported by that file, and so on. Please note that the code should be fully functional. No placeholders.
          - paragraph [ref=e785]: Follow a language and framework appropriate best practice file naming convention. Make sure that files contain all imports, types etc. Make sure that code in different files are compatible with each other. Ensure to implement all code, if you are unsure, write a plausible implementation. Include module dependency or package manager dependency definition file. Before you finish, double check that all parts of the architecture is present in the files.
          - paragraph [ref=e786]: "Useful to know: You almost always put different classes in different files. For Python, you always create an appropriate requirements.txt file. For NodeJS, you always create an appropriate package.json file. You always add a comment briefly describing the purpose of the function definition. You try to add comments explaining very complex bits of logic. You always follow the best practices for the requested languages in terms of describing the code written as a defined package/project."
          - paragraph [ref=e787]: "Python toolbelt preferences:"
          - list [ref=e788]:
            - listitem [ref=e789]: pytest
            - listitem [ref=e790]: dataclasses
        - paragraph [ref=e791]: "Conversatin samples:"
        - code [ref=e793]: "[ { \"role\": \"system\", \"content\": \"You will get instructions for code to write.\\nYou will write a very long answer. Make sure that every detail of the architecture is, in the end, implemented as code.\\nMake sure that every detail of the architecture is, in the end, implemented as code.\\n\\nThink step by step and reason yourself to the right decisions to make sure we get it right.\\nYou will first lay out the names of the core classes, functions, methods that will be necessary, as well as a quick comment on their purpose.\\n\\nThen you will output the content of each file including ALL code.\\nEach file must strictly follow a markdown code block format, where the following tokens must be replaced such that\\nFILENAME is the lowercase file name including the file extension,\\nLANG is the markup code block language for the code's language, and CODE is the code:\\n\\nFILENAME\\n```LANG\\nCODE\\n```\\n\\nYou will start with the \\\"entrypoint\\\" file, then go to the ones that are imported by that file, and so on.\\nPlease note that the code should be fully functional. No placeholders.\\n\\nFollow a language and framework appropriate best practice file naming convention.\\nMake sure that files contain all imports, types etc. Make sure that code in different files are compatible with each other.\\nEnsure to implement all code, if you are unsure, write a plausible implementation.\\nInclude module dependency or package manager dependency definition file.\\nBefore you finish, double check that all parts of the architecture is present in the files.\\n\\nUseful to know:\\nYou almost always put different classes in different files.\\nFor Python, you always create an appropriate requirements.txt file.\\nFor NodeJS, you always create an appropriate package.json file.\\nYou always add a comment briefly describing the purpose of the function definition.\\nYou try to add comments explaining very complex bits of logic.\\nYou always follow the best practices for the requested languages in terms of describing the code written as a defined\\npackage/project.\\n\\n\\nPython toolbelt preferences:\\n- pytest\\n- dataclasses\\n\" }, # … same conversation as earlier, ended with \"Make your own assumptions and state them explicitly before starting\". { \"role\": \"assistant\", \"content\": \"Assumptions:\\n1. Model: The model will contain the game's data, such as level information, character states, and enemy positions.\\n2. View: The view will handle the game's visuals, including rendering the game objects, backgrounds, and updating the display.\\n3. Controller: The controller will manage user input, such as keyboard controls, and update the model accordingly.\\n\\nWith these assumptions in mind, is there any specific aspect of the keyboard control implementation you would like me to clarify?\" }, { \"role\": \"user\", \"content\": \"Please now remember the steps:\\n\\nThink step by step and reason yourself to the right decisions to make sure we get it right.\\nFirst lay out the names of the core classes, functions, methods that will be necessary, As well as a quick comment on their purpose.\\n\\nThen you will output the content of each file including ALL code.\\nEach file must strictly follow a markdown code block format, where the following tokens must be replaced such that\\nFILENAME is the lowercase file name including the file extension,\\nLANG is the markup code block language for the code's language, and CODE is the code:\\n\\nFILENAME\\n```LANG\\nCODE\\n```\\n\\nPlease note that the code should be fully functional. No placeholders.\\n\\nYou will start with the \\\"entrypoint\\\" file, then go to the ones that are imported by that file, and so on.\\nFollow a language and framework appropriate best practice file naming convention.\\nMake sure that files contain all imports, types etc. The code should be fully functional. Make sure that code in different files are compatible with each other.\\nBefore you finish, double check that all parts of the architecture is present in the files.\\n\" } ]"
        - heading "Challenges" [level=1] [ref=e794]
        - paragraph [ref=e795]: "After going through key ideas and demos of building LLM-centered agents, I start to see a couple common limitations:"
        - list [ref=e796]:
          - listitem [ref=e797]:
            - paragraph [ref=e798]:
              - strong [ref=e799]: Finite context length
              - text: ": The restricted context capacity limits the inclusion of historical information, detailed instructions, API call context, and responses. The design of the system has to work with this limited communication bandwidth, while mechanisms like self-reflection to learn from past mistakes would benefit a lot from long or infinite context windows. Although vector stores and retrieval can provide access to a larger knowledge pool, their representation power is not as powerful as full attention."
          - listitem [ref=e800]:
            - paragraph [ref=e801]:
              - strong [ref=e802]: Challenges in long-term planning and task decomposition
              - text: ": Planning over a lengthy history and effectively exploring the solution space remain challenging. LLMs struggle to adjust plans when faced with unexpected errors, making them less robust compared to humans who learn from trial and error."
          - listitem [ref=e803]:
            - paragraph [ref=e804]:
              - strong [ref=e805]: Reliability of natural language interface
              - text: ": Current agent system relies on natural language as an interface between LLMs and external components such as memory and tools. However, the reliability of model outputs is questionable, as LLMs may make formatting errors and occasionally exhibit rebellious behavior (e.g. refuse to follow an instruction). Consequently, much of the agent demo code focuses on parsing model output."
