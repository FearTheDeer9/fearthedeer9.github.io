        - 'heading "Component One: Planning" [level=1] [ref=e57]'
        - paragraph [ref=e58]: A complicated task usually involves many steps. An agent needs to know what they are and plan ahead.
        - heading "Task Decomposition" [level=2] [ref=e59]
        - paragraph [ref=e60]:
          - link "Chain of thought" [ref=e61] [cursor=pointer]:
            - /url: https://lilianweng.github.io/posts/2023-03-15-prompt-engineering/#chain-of-thought-cot
            - strong [ref=e62]: Chain of thought
          - text: (CoT;
          - link "Wei et al. 2022" [ref=e63] [cursor=pointer]:
            - /url: https://arxiv.org/abs/2201.11903
          - text: ) has become a standard prompting technique for enhancing model performance on complex tasks. The model is instructed to “think step by step” to utilize more test-time computation to decompose hard tasks into smaller and simpler steps. CoT transforms big tasks into multiple manageable tasks and shed lights into an interpretation of the model’s thinking process.
        - paragraph [ref=e64]:
          - strong [ref=e65]: Tree of Thoughts
          - text: (
          - link "Yao et al. 2023" [ref=e66] [cursor=pointer]:
            - /url: https://arxiv.org/abs/2305.10601
          - text: ) extends CoT by exploring multiple reasoning possibilities at each step. It first decomposes the problem into multiple thought steps and generates multiple thoughts per step, creating a tree structure. The search process can be BFS (breadth-first search) or DFS (depth-first search) with each state evaluated by a classifier (via a prompt) or majority vote.
        - paragraph [ref=e67]:
          - text: Task decomposition can be done (1) by LLM with simple prompting like
          - code [ref=e68]: "\"Steps for XYZ.\\n1.\""
          - text: ","
          - code [ref=e69]: "\"What are the subgoals for achieving XYZ?\""
          - text: ", (2) by using task-specific instructions; e.g."
          - code [ref=e70]: "\"Write a story outline.\""
          - text: for writing a novel, or (3) with human inputs.
        - paragraph [ref=e71]:
          - text: Another quite distinct approach,
          - strong [ref=e72]: LLM+P
          - text: (
          - link "Liu et al. 2023" [ref=e73] [cursor=pointer]:
            - /url: https://arxiv.org/abs/2304.11477
          - text: ), involves relying on an external classical planner to do long-horizon planning. This approach utilizes the Planning Domain Definition Language (PDDL) as an intermediate interface to describe the planning problem. In this process, LLM (1) translates the problem into “Problem PDDL”, then (2) requests a classical planner to generate a PDDL plan based on an existing “Domain PDDL”, and finally (3) translates the PDDL plan back into natural language. Essentially, the planning step is outsourced to an external tool, assuming the availability of domain-specific PDDL and a suitable planner which is common in certain robotic setups but not in many other domains.
        - heading "Self-Reflection" [level=2] [ref=e74]
        - paragraph [ref=e75]: Self-reflection is a vital aspect that allows autonomous agents to improve iteratively by refining past action decisions and correcting previous mistakes. It plays a crucial role in real-world tasks where trial and error are inevitable.
        - paragraph [ref=e76]:
          - strong [ref=e77]: ReAct
          - text: (
          - link "Yao et al. 2023" [ref=e78] [cursor=pointer]:
            - /url: https://arxiv.org/abs/2210.03629
          - text: ) integrates reasoning and acting within LLM by extending the action space to be a combination of task-specific discrete actions and the language space. The former enables LLM to interact with the environment (e.g. use Wikipedia search API), while the latter prompting LLM to generate reasoning traces in natural language.
        - paragraph [ref=e79]: "The ReAct prompt template incorporates explicit steps for LLM to think, roughly formatted as:"
        - code [ref=e81]: "Thought: ... Action: ... Observation: ... ... (Repeated many times)"
        - 'figure "Examples of reasoning trajectories for knowledge-intensive tasks (e.g. HotpotQA, FEVER) and decision-making tasks (e.g. AlfWorld Env, WebShop). (Image source: Yao et al. 2023)." [ref=e82]':
