        - paragraph [ref=e474]:
          - text: The idea of CoH is to present a history of sequentially improved outputs in context and train the model to take on the trend to produce better outputs.
          - strong [ref=e475]: Algorithm Distillation
          - text: (AD;
          - link "Laskin et al. 2023" [ref=e476] [cursor=pointer]:
            - /url: https://arxiv.org/abs/2210.14215
          - text: ) applies the same idea to cross-episode trajectories in reinforcement learning tasks, where an
          - emphasis [ref=e477]: algorithm
          - text: is encapsulated in a long history-conditioned policy. Considering that an agent interacts with the environment many times and in each episode the agent gets a little better, AD concatenates this learning history and feeds that into the model. Hence we should expect the next predicted action to lead to better performance than previous trials. The goal is to learn the process of RL instead of training a task-specific policy itself.
        - 'figure "Illustration of how Algorithm Distillation (AD) works. (Image source: Laskin et al. 2023)." [ref=e478]':
          - img [ref=e479]
          - generic [ref=e480]:
            - text: Illustration of how Algorithm Distillation (AD) works.
            - text: "(Image source:"
            - link "Laskin et al. 2023" [ref=e481] [cursor=pointer]:
              - /url: https://arxiv.org/abs/2210.14215
            - text: ).
        - paragraph [ref=e482]: The paper hypothesizes that any algorithm that generates a set of learning histories can be distilled into a neural network by performing behavioral cloning over actions. The history data is generated by a set of source policies, each trained for a specific task. At the training stage, during each RL run, a random task is sampled and a subsequence of multi-episode history is used for training, such that the learned policy is task-agnostic.
        - paragraph [ref=e483]: In reality, the model has limited context window length, so episodes should be short enough to construct multi-episode history. Multi-episodic contexts of 2-4 episodes are necessary to learn a near-optimal in-context RL algorithm. The emergence of in-context RL requires long enough context.
        - paragraph [ref=e484]:
          - text: In comparison with three baselines, including ED (expert distillation, behavior cloning with expert trajectories instead of learning history), source policy (used for generating trajectories for distillation by
          - link "UCB" [ref=e485] [cursor=pointer]:
            - /url: https://lilianweng.github.io/posts/2018-01-23-multi-armed-bandit/#upper-confidence-bounds
          - text: ), RL^2 (
          - link "Duan et al. 2017" [ref=e486] [cursor=pointer]:
            - /url: https://arxiv.org/abs/1611.02779
          - text: ; used as upper bound since it needs online RL), AD demonstrates in-context RL with performance getting close to RL^2 despite only using offline RL and learns much faster than other baselines. When conditioned on partial training history of the source policy, AD also improves much faster than ED baseline.
