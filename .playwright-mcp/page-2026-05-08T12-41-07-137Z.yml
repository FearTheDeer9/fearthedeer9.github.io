          - paragraph [ref=e312]:
            - text: The paper introduces
            - strong [ref=e313]: Targeted Cause Discovery with Data-Driven Learning (TCD-DL)
            - text: ", a machine learning-based approach to identify all causal variables—direct and indirect—of a target variable in large-scale systems, such as gene regulatory networks (GRNs). Traditional causal discovery methods often falter due to scalability issues and error propagation when tracing indirect causes. TCD-DL overcomes these challenges by leveraging a pre-trained neural network and a scalable inference strategy."
          - heading "Key Components and Methodology" [level=5] [ref=e314]:
            - strong [ref=e315]: Key Components and Methodology
          - list [ref=e316]:
            - listitem [ref=e317]:
              - paragraph [ref=e318]:
                - strong [ref=e319]: Pre-Trained Feature Extractor
                - text: ":"
                - text: The core of TCD-DL is a
                - strong [ref=e320]: feature extractor
                - text: ", implemented as a multi-layer axial Transformer. This component is trained on simulated graphs with diverse structures (e.g., Erdös-Rényi, Scale-Free) to learn generalizable features of causal relationships. These features are then used by a score calculator to infer causal structures in new systems. The training assumes some similarity in causal dynamics between the simulated graphs and real-world systems, but the learned features are transferable, allowing the model to generalize to unseen graphs like biological networks."
            - listitem [ref=e321]:
              - paragraph [ref=e322]:
                - strong [ref=e323]: Scalability via Local Inference
                - text: ":"
                - text: TCD-DL tackles large systems by subsampling the data into smaller subsets. It performs
                - strong [ref=e324]: local inference
                - text: on each subset and aggregates the results through ensembling, reducing computational complexity from exponential or quadratic to linear. This makes it practical for systems with thousands of variables.
